services:
  mysql:
    image: mysql:8.0
    container_name: retail_sales_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: retail_sales_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: retail_sales_etl
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      LOAD_TO_MYSQL: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: retail_sales_db
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs

volumes:
  mysql_data:
